# имя проекта задано явно — иначе docker compose падает,
# т.к. имя папки (кириллица) не даёт вывести project name
name: plantcare

services:
  db:
    image: postgres:15-alpine
    container_name: plantcare-db
    restart: always
    environment:
      POSTGRES_DB: plantcare
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d plantcare"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    image: plantcare-api
    container_name: plantcare-api-web
    build:
      context: ./server
      dockerfile: API/Dockerfile
    restart: always
    ports:
      - "5071:5071"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=db;Port=5432;Database=plantcare;Username=postgres;Password=postgres
      # user-secrets живут в профиле хоста и НЕ видны внутри контейнера — без этих
      # переменных PlantNetClient молча уходит в мок (ApiKey пустой) и всегда отвечает
      # фикстурой 'monstera', что бы ни было на фото. Значения — из корневого .env
      # (см. .env.example), сам .env в git не коммитим.
      - PlantNet__ApiKey=${PLANTNET_API_KEY:-}
      - Jwt__Secret=${JWT_SECRET:-}
      - Vapid__PublicKey=${VAPID_PUBLIC_KEY:-}
      - Vapid__PrivateKey=${VAPID_PRIVATE_KEY:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
