# имя проекта задано явно — иначе docker compose падает,
# т.к. имя папки (кириллица) не даёт вывести project name
name: plantcare

services:
  db:
    image: postgres:15-alpine
    container_name: plantcare-db
    restart: always
    environment:
      POSTGRES_DB: plantcare
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d plantcare"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    image: plantcare-api
    container_name: plantcare-api-web
    build:
      context: ./server
      dockerfile: API/Dockerfile
    restart: always
    ports:
      - "5071:5071"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=db;Port=5432;Database=plantcare;Username=postgres;Password=postgres
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
